name: CI
on: [push, pull_request]

jobs:
  product-repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: articles/ must not contain *.md (Zenn slug collision guard)
        run: |
          # articles/ ディレクトリ自体は OK (Zenn が「articles ディレクトリが見つかりません」と
          # 警告するため .gitkeep 等のマーカーで存在させる)。
          # 実 Zenn 記事 (*.md) が混入したら reject — slug 衝突の原因なので絶対 NG。
          if [ -d "articles" ]; then
            md_files=$(find articles -maxdepth 2 -name '*.md' -print 2>/dev/null || true)
            if [ -n "$md_files" ]; then
              echo "::error::articles/ に .md ファイルが混入しています (Zenn Slug 衝突の原因)"
              echo "$md_files"
              exit 1
            fi
            echo "OK: articles/ 配下に .md は無し (現状: $(ls -A articles/ | tr '\n' ' '))"
          else
            echo "OK: articles/ not present (Zenn 連携前なら問題なし)"
          fi

      - name: docs/meta/ must not exist (戦略文書は非公開)
        run: |
          if [ -d "docs/meta" ]; then
            echo "::error::docs/meta/ は内部戦略文書。公開リポジトリに含めてはいけない"
            ls -la docs/meta/
            exit 1
          fi
          echo "OK: docs/meta/ not present"

      - name: CLAUDE.md line limit (250 行以内)
        run: |
          if [ -f "CLAUDE.md" ]; then
            lines=$(wc -l < CLAUDE.md | tr -d ' ')
            if [ "$lines" -gt 250 ]; then
              echo "::error::CLAUDE.md が ${lines} 行（上限 250 行）"
              exit 1
            fi
            echo "OK: CLAUDE.md ${lines} 行"
          fi

      - name: shell scripts syntax check
        run: |
          fail=0
          for f in scripts/*.sh done.sh; do
            [ -f "$f" ] || continue
            if bash -n "$f"; then
              echo "OK: $f"
            else
              echo "::error::syntax error in $f"
              fail=1
            fi
          done
          exit $fail

      - name: soft-language check (仕組み的対策セクション)
        run: |
          if [ -f scripts/check_soft_language.sh ]; then
            bash scripts/check_soft_language.sh
          fi
